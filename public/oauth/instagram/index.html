<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Connected — Brand Gita</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      font-size: 16px;
      line-height: 1.6;
      font-weight: 300;
      color: #1A1A18;
      background: #EBE7DB;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 2rem;
    }
    .card { text-align: center; max-width: 380px; }
    .wordmark {
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: #1A1A18;
      margin-bottom: 2rem;
    }
    h1 { font-size: 1.25rem; font-weight: 700; margin-bottom: 0.75rem; }
    p { font-size: 0.9375rem; color: #5A5A52; margin-bottom: 1.5rem; }
    .btn {
      display: inline-block;
      padding: 0.65rem 1.5rem;
      background: #1A1A18;
      color: #EBE7DB;
      border-radius: 6px;
      font-size: 0.9375rem;
      font-weight: 600;
      text-decoration: none;
      cursor: pointer;
      border: none;
      transition: transform 0.1s ease, background 0.1s ease, box-shadow 0.1s ease;
      box-shadow: 0 2px 8px rgba(26,26,24,0.18);
      position: relative;
      overflow: hidden;
    }
    .btn:hover { background: #2e2e2b; box-shadow: 0 4px 14px rgba(26,26,24,0.28); }
    .btn:active, .btn.pressed {
      transform: scale(0.94);
      background: #3d3d39;
      box-shadow: 0 1px 4px rgba(26,26,24,0.12);
    }
    .btn.loading { pointer-events: none; opacity: 0.85; }
    .btn .label { display: inline-block; }
    .btn .dots { display: none; }
    .btn.loading .label { display: none; }
    .btn.loading .dots { display: inline-block; }
    @keyframes ripple { to { transform: scale(4); opacity: 0; } }
    .ripple {
      position: absolute; border-radius: 50%;
      background: rgba(235,231,219,0.35);
      width: 40px; height: 40px;
      transform: scale(0);
      animation: ripple 0.5s linear;
      pointer-events: none;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="wordmark">Brand Gita</div>
    <h1 id="title">Instagram connected.</h1>
    <p id="subtitle">Click below to return to the app.</p>
    <button class="btn" id="open-btn"><span class="label">Open Brand Gita</span><span class="dots">Opening…</span></button>
  </div>
  <script>
    (function () {
      var p     = new URLSearchParams(window.location.search);
      var code  = p.get('code');
      var error = p.get('error');
      var state = {};
      try { state = JSON.parse(p.get('state') || '{}'); } catch (_) {}
      var port  = state.port || 9878;

      if (!code && !error) return;

      var btn      = document.getElementById('open-btn');
      var title    = document.getElementById('title');
      var subtitle = document.getElementById('subtitle');

      btn.addEventListener('mousedown', function (e) {
        var r = document.createElement('span');
        r.className = 'ripple';
        var rect = btn.getBoundingClientRect();
        r.style.left = (e.clientX - rect.left - 20) + 'px';
        r.style.top  = (e.clientY - rect.top  - 20) + 'px';
        btn.appendChild(r);
        r.addEventListener('animationend', function () { r.remove(); });
      });

      btn.onclick = function () {
        btn.classList.add('pressed', 'loading');
        var url = 'http://127.0.0.1:' + port + '/?' + (code
          ? 'code=' + encodeURIComponent(code)
          : 'error=' + encodeURIComponent(error));
        fetch(url)
          .then(function () {
            title.textContent = 'All done.';
            subtitle.textContent = 'You can close this tab and return to Brand Gita.';
            btn.style.display = 'none';
          })
          .catch(function () {
            btn.classList.remove('loading');
            title.textContent = 'App not found.';
            subtitle.textContent = 'Make sure Brand Gita is open, then try again.';
          });
      };

      // Auto-send without user interaction — works because fetch doesn't need a gesture
      (function autoSend() {
        var url = 'http://127.0.0.1:' + port + '/?' + (code
          ? 'code=' + encodeURIComponent(code)
          : 'error=' + encodeURIComponent(error));
        fetch(url)
          .then(function () {
            title.textContent = 'All done.';
            subtitle.textContent = 'You can close this tab and return to Brand Gita.';
            btn.style.display = 'none';
          })
          .catch(function () {
            // App not running or fetch failed — show button as fallback
          });
      })();
    })();
  </script>
</body>
</html>
