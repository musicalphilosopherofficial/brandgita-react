<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Connected — Brand Gita</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      font-size: 16px;
      line-height: 1.6;
      font-weight: 300;
      color: #1A1A18;
      background: #EBE7DB;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 2rem;
    }
    .card { text-align: center; max-width: 380px; }
    .wordmark {
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: #1A1A18;
      margin-bottom: 2rem;
    }
    h1 { font-size: 1.25rem; font-weight: 700; margin-bottom: 0.75rem; }
    p { font-size: 0.9375rem; color: #5A5A52; margin-bottom: 1.5rem; }
    .btn {
      display: inline-block;
      padding: 0.65rem 1.5rem;
      background: #1A1A18;
      color: #EBE7DB;
      border-radius: 6px;
      font-size: 0.9375rem;
      font-weight: 600;
      text-decoration: none;
      cursor: pointer;
      border: none;
      transition: transform 0.1s ease, background 0.1s ease, box-shadow 0.1s ease;
      box-shadow: 0 2px 8px rgba(26,26,24,0.18);
      position: relative;
      overflow: hidden;
    }
    .btn:hover {
      background: #2e2e2b;
      box-shadow: 0 4px 14px rgba(26,26,24,0.28);
    }
    .btn:active, .btn.pressed {
      transform: scale(0.94);
      background: #3d3d39;
      box-shadow: 0 1px 4px rgba(26,26,24,0.12);
    }
    .btn.loading {
      pointer-events: none;
      opacity: 0.85;
    }
    .btn .label { display: inline-block; }
    .btn .dots {
      display: none;
      letter-spacing: 0.15em;
      animation: ellipsis 1.2s steps(4, end) infinite;
    }
    .btn.loading .label { display: none; }
    .btn.loading .dots { display: inline-block; }
    @keyframes ellipsis {
      0%   { content: ''; }
      25%  { content: '.'; }
      50%  { content: '..'; }
      75%  { content: '...'; }
      100% { content: ''; }
    }
    @keyframes ripple {
      to { transform: scale(4); opacity: 0; }
    }
    .ripple {
      position: absolute;
      border-radius: 50%;
      background: rgba(235,231,219,0.35);
      width: 40px; height: 40px;
      transform: scale(0);
      animation: ripple 0.5s linear;
      pointer-events: none;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="wordmark">Brand Gita</div>
    <h1>Instagram connected.</h1>
    <p>Click below to return to the app.</p>
    <a class="btn" id="open-btn" href="#"><span class="label">Open Brand Gita</span><span class="dots">Opening</span></a>
  </div>
  <script>
    (function () {
      var p = new URLSearchParams(window.location.search);
      var code  = p.get('code');
      var error = p.get('error');
      if (!code && !error) return;

      var uri = code
        ? 'brandgita://oauth/instagram?code='  + encodeURIComponent(code)
        : 'brandgita://oauth/instagram?error=' + encodeURIComponent(error);

      var btn = document.getElementById('open-btn');

      btn.addEventListener('mousedown', function (e) {
        var r = document.createElement('span');
        r.className = 'ripple';
        var rect = btn.getBoundingClientRect();
        r.style.left = (e.clientX - rect.left - 20) + 'px';
        r.style.top  = (e.clientY - rect.top  - 20) + 'px';
        btn.appendChild(r);
        r.addEventListener('animationend', function () { r.remove(); });
      });

      btn.href = uri;  // real anchor href — Chrome treats this the same as VS Code's vscode:// links
      btn.onclick = function () {
        btn.classList.add('pressed', 'loading');
      };

      // auto-open only works if the user landed here via a direct link; timer-based
      // navigation loses the gesture context in Chrome and gets silently blocked,
      // so we skip it and rely on the button only.
      // setTimeout(function () { window.location.href = uri; }, 500);
    })();
  </script>
</body>
</html>
