<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Connected — Brand Gita</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      font-size: 16px;
      line-height: 1.6;
      font-weight: 300;
      color: #1A1A18;
      background: #EBE7DB;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 2rem;
    }
    .card { text-align: center; max-width: 380px; }
    .wordmark {
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: #1A1A18;
      margin-bottom: 2rem;
    }
    h1 { font-size: 1.25rem; font-weight: 700; margin-bottom: 0.75rem; }
    p { font-size: 0.9375rem; color: #5A5A52; margin-bottom: 1.5rem; }
    .btn {
      display: inline-block;
      padding: 0.65rem 1.5rem;
      background: #1A1A18;
      color: #EBE7DB;
      border-radius: 6px;
      font-size: 0.9375rem;
      font-weight: 600;
      text-decoration: none;
      cursor: pointer;
      border: none;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="wordmark">Brand Gita</div>
    <h1>Instagram connected.</h1>
    <p>Click below to return to the app.</p>
    <button class="btn" id="open-btn">Open Brand Gita</button>
  </div>
  <script>
    (function () {
      var p = new URLSearchParams(window.location.search);
      var code  = p.get('code');
      var error = p.get('error');
      if (!code && !error) return;

      var uri = code
        ? 'brandgita://oauth/instagram?code='  + encodeURIComponent(code)
        : 'brandgita://oauth/instagram?error=' + encodeURIComponent(error);

      document.getElementById('open-btn').onclick = function () {
        window.location.href = uri;
      };

      // Also attempt auto-open after short delay
      setTimeout(function () { window.location.href = uri; }, 500);
    })();
  </script>
</body>
</html>
